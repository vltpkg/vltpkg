name: CI

on:
  workflow_dispatch:
    inputs:
      filter:
        description: 'A pnpm filter to run only a subset of tests. Leave blank to run all tests.'
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-filter:
    name: Detect Filter
    runs-on: ubuntu-latest
    outputs:
      prepare: ${{ steps.filters.outputs.prepare }}
      test: ${{ steps.filters.outputs.test }}
      matrix: ${{ steps.filters.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Branch Name
        id: branch
        run: echo "value=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT

      - name: Fetch base ref
        if: github.event_name == 'pull_request' && steps.branch.outputs.value != 'release'
        run: git fetch --no-tags --prune --depth=1 origin +refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Set run-script filters
        id: filters
        shell: bash
        run: |
          # Release PR always runs full matrix of all tests
          if [[ "${{ github.event_name }}" == "pull_request" ]] && [[ "${{ steps.branch.outputs.value }}" == "release" ]]; then
            ./scripts/run-script-filter
            echo "matrix=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Other PRs run only changes from main and the smaller matrix
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ./scripts/run-script-filter since "${{ github.base_ref }}"
            echo "matrix=limited" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Dispatched workflows only run the filter that is passed in and the smaller matrix
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ./scripts/run-script-filter filter "${{ inputs.filter }}"
            echo "matrix=limited" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Default is the full matrix of all tests
          ./scripts/run-script-filter
          echo "matrix=full" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    needs: detect-filter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Nodejs
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
          check-latest: true

      - name: Install dependencies
        run: pnpm install

      # TODO: if the lint job starts to take too long, it can be sped up
      # by making any of the steps operate on only changed workspaces.
      # For now any steps that dont use filters are run from the root
      # on all workspaces.
      - name: Formatting
        run: pnpm run format:check
        id: format
        continue-on-error: true

      - name: Linting
        run: pnpm run lint:check
        id: lint
        continue-on-error: true

      - name: Dependencies
        run: pnpm run deps:check
        id: deps
        continue-on-error: true

      - name: Docs
        run: pnpm -F docs typedoc:check
        id: docs
        continue-on-error: true

      - name: Consistent Workspaces
        run: |
          pnpm run fix:pkg
          if [ -n "$(git status --porcelain)" ]; then
            git diff
            exit 1
          fi
        id: workspaces
        continue-on-error: true

      - name: Check Results
        run: |
          declare -A OUTCOMES=(
            [format]="${{ steps.format.outcome }}"
            [lint]="${{ steps.lint.outcome }}"
            [deps]="${{ steps.deps.outcome }}"
            [docs]="${{ steps.docs.outcome }}"
            [workspaces]="${{ steps.workspaces.outcome }}"
          )
          STATUS=0
          for STEP in "${!OUTCOMES[@]}"; do
            OUTCOME="${OUTCOMES[$STEP]}"
            echo "$STEP: $OUTCOME"
            if [ "$OUTCOME" != "success" ]; then
              STATUS=1
            fi
          done
          exit $STATUS

  test:
    name: Test - ${{ matrix.platform.name }} - ${{ matrix.node-version }}
    needs: detect-filter
    if: needs.detect-filter.outputs.test && needs.detect-filter.outputs.prepare
    runs-on: ${{ matrix.platform.os }}
    defaults:
      run:
        shell: ${{ matrix.platform.shell }}
    strategy:
      matrix:
        node-version: [22.x]
        platform:
          - name: Ubuntu
            os: ubuntu-latest
            shell: bash
          - name: macOS
            os: macos-latest
            shell: bash
          - name: macOS Intel
            os: macos-13
            shell: bash
          - name: Windows
            os: windows-latest
            shell: bash
          - name: Windows Powershell
            os: windows-latest
            shell: powershell
        exclude:
          - platform: ${{ fromJSON(needs.detect-filter.outputs.matrix == 'limited' && '{"name":"macOS","os":"macos-latest","shell":"bash"}') }}
          - platform: ${{ fromJSON(needs.detect-filter.outputs.matrix == 'limited' && '{"name":"macOS Intel","os":"macos-13","shell":"bash"}') }}
          - platform: ${{ fromJSON(needs.detect-filter.outputs.matrix == 'limited' && '{"name":"Windows Powershell","os":"windows-latest","shell":"powershell"}') }}
      fail-fast: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Use Nodejs ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          check-latest: true

      - name: Install dependencies
        run: pnpm ${{ needs.detect-filter.outputs.prepare }} install --ignore-scripts

      - name: Prepare
        run: pnpm ${{ needs.detect-filter.outputs.prepare }} prepare

      - name: Run Tests
        run: pnpm ${{ needs.detect-filter.outputs.test }} --no-bail --aggregate-output test

      - name: Smoke Tests
        if: needs.detect-filter.outputs.matrix == 'full'
        run: pnpm -F smoke-test test
